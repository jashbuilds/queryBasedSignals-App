<div class="container">
    <div class="row d-flex justify-content-center align-items-center mb-5">
        <ng-content />
        @for(task of tasks(); track $index) {
        <div class="col-sm-6 col-md-4 col-12 g-3 d-flex justify-content-center">
            <div class="card text-bg-secondary mb-3 w-100" [ngClass]="{
                'text-bg-success': task.completed,
                'text-bg-secondary': !task.completed
            }">
                <div class="card-header">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value
                            [id]="'checkDefault-' + $index"
                            [(ngModel)]="task.completed">
                        <label class="form-check-label fw-semibold"
                            [for]="'checkDefault-' + $index">
                            @if(task.completed) {
                            {{ 'Complete' }}
                            } @else {
                            {{ 'Draft' }}
                            }
                        </label>
                    </div>
                </div>
                <div class="card-body">
                    <h5 class="card-title">Task- {{ $index + 1 }}</h5>
                    <p class="card-text">{{ task.task }}</p>
                </div>
            </div>
        </div>
        }
    </div>
</div>
